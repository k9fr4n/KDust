name: Build & Publish Docker image

# Triggered on:
#   - any push to main          → image :latest + :sha-<short>
#   - any tag vX.Y.Z            → image :vX.Y.Z + :latest
#   - workflow_dispatch         → manual button (same rules as main)
#
# Architecture:
#   1. `build` job — matrix amd64/arm64 on NATIVE runners (no QEMU).
#      Each leg builds and pushes its image BY DIGEST only (no tag yet).
#   2. `merge` job — assembles the final multi-arch manifest from both
#      digests and applies the human-readable tags via
#      `docker buildx imagetools create`.
#
# Why: building arm64 under QEMU on a single amd64 runner takes ~15 min for
# this app (npm + next build are JS-heavy, awful under emulation). Splitting
# on native arm64 runners brings the wall-clock down to ~6–8 min cold and
# ~2–3 min warm.
on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # -------------------------------------------------------------------- #
  # 1. Per-platform build → push by digest only                          #
  # -------------------------------------------------------------------- #
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm   # GitHub-hosted native arm64 (free on public repos)
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Lowercase image name
        run: echo "IMAGE_LC=${IMAGE_NAME,,}" >> "$GITHUB_ENV"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          # Push the per-platform image WITHOUT a tag, only by digest.
          # The merge job assembles the final tagged manifest.
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_LC }},push-by-digest=true,name-canonical=true,push=true
          # Per-arch cache scope so legs don't overwrite each other.
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_LC }}:buildcache-${{ matrix.arch }}
          cache-to:   type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_LC }}:buildcache-${{ matrix.arch }},mode=max
          # Disable provenance + sbom: saves 30–60s per leg, we don't consume them.
          provenance: false
          sbom: false
          build-args: |
            NEXT_TELEMETRY_DISABLED=1

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # -------------------------------------------------------------------- #
  # 2. Merge per-arch digests into a single multi-arch manifest          #
  # -------------------------------------------------------------------- #
  merge:
    name: Merge multi-arch manifest
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Lowercase image name
        run: echo "IMAGE_LC=${IMAGE_NAME,,}" >> "$GITHUB_ENV"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/') }}
          labels: |
            org.opencontainers.image.title=KDust
            org.opencontainers.image.description=Self-hosted Dust agent scheduler with push pipeline and MCP servers
            org.opencontainers.image.vendor=Ecritel

      - name: Create multi-arch manifest
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY }}/${{ env.IMAGE_LC }}@sha256:%s ' *)

      - name: Inspect resulting image
        run: |
          docker buildx imagetools inspect \
            ${{ env.REGISTRY }}/${{ env.IMAGE_LC }}:${{ steps.meta.outputs.version }}
