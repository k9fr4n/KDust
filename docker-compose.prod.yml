# docker-compose.prod.yml — Raspberry Pi 4 (arm64) ou tout hôte sans build local
#
# Pré-requis sur le Pi :
#   1. docker login ghcr.io -u <ton-github-login> -p <PAT>
#      (le PAT GitHub doit avoir le scope read:packages)
#   2. cp .env.example .env && nano .env   (remplir tous les secrets)
#   3. mkdir -p data projects
#
# Démarrage :
#   docker compose -f docker-compose.prod.yml up -d
#
# Mise à jour automatique :
#   Watchtower vérifie ghcr.io toutes les 5 minutes.
#   Dès qu'une nouvelle image :latest est disponible, il pull + redémarre kdust.

services:
  kdust:
    # Pas de build: — on tire l'image pré-buildée depuis ghcr.io
    # L'image est multi-arch (amd64 + arm64) : Docker choisit automatiquement
    # la bonne variante selon l'hôte.
    image: ghcr.io/k9fr4n/kdust:latest
    container_name: kdust
    restart: unless-stopped
    pull_policy: always          # tire la dernière image à chaque `up`
    # Label Watchtower : ce conteneur sera surveillé et mis à jour automatiquement
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      - SSH_AUTH_SOCK=${SSH_AUTH_SOCK:-}
      # Chemin HÔTE du répertoire projects (résolu par Compose via ${PWD}).
      # Nécessaire pour les montages DooD (-v host_path:container_path).
      - KDUST_HOST_PROJECTS_ROOT=${PWD}/projects
    volumes:
      - ./data:/data
      - ./projects:/projects
      # Clefs SSH de l'hôte (read-only, copiées par l'entrypoint)
      - ${HOME}/.ssh:/host-ssh:ro
      # Socket ssh-agent (optionnel)
      - ${SSH_AUTH_SOCK:-/dev/null}:${SSH_AUTH_SOCK:-/dev/null}
      # Docker socket — DooD (accès = root sur l'hôte, cf. Dockerfile)
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  # -------------------------------------------------------------------------- #
  # Watchtower — mise à jour automatique du conteneur kdust                    #
  # Surveille ghcr.io toutes les 5 minutes (300s).                             #
  # Dès qu'une nouvelle image est détectée : pull silencieux + redémarrage.    #
  # -------------------------------------------------------------------------- #
  watchtower:
    image: containrrr/watchtower:latest
    container_name: watchtower
    restart: unless-stopped
    volumes:
      # Accès au daemon Docker pour inspecter et redémarrer les conteneurs
      - /var/run/docker.sock:/var/run/docker.sock
      # Credentials Docker de l'hôte (docker login ghcr.io fait plus haut)
      # Watchtower les lit pour pouvoir puller des images privées
      - ${HOME}/.docker/config.json:/config.json:ro
    environment:
      # Ne surveille QUE le conteneur kdust (pas watchtower lui-même, etc.)
      WATCHTOWER_SCOPE: kdust-autoupdate
      # Vérifie toutes les 5 minutes
      WATCHTOWER_POLL_INTERVAL: "300"
      # Supprime l'ancienne image après mise à jour (libère de la place)
      WATCHTOWER_CLEANUP: "true"
      # Log level lisible
      WATCHTOWER_DEBUG: "false"
      # Notifie dans les logs Docker (visible via `docker logs watchtower`)
      WATCHTOWER_NOTIFICATIONS: "shoutrrr"
      WATCHTOWER_NOTIFICATION_URL: ""   # laisser vide = logs uniquement
    # Watchtower ne surveille que les conteneurs qui portent ce label
    command: --label-enable --interval 300 --cleanup
