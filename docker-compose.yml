services:
  kdust:
    build: .
    image: kdust:local
    container_name: kdust
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    env_file: .env
    environment:
      # Si ssh-agent est lancé sur l'hôte et SSH_AUTH_SOCK exporté,
      # l'agent sera utilisé en priorité sur les clés copiées.
      - SSH_AUTH_SOCK=${SSH_AUTH_SOCK:-}
    volumes:
      - ./data:/data
      - ./projects:/projects
      # Clefs SSH de l'hôte en read-only. L'entrypoint les copie ensuite
      # dans /home/kdust/.ssh avec les bonnes perms / ownership.
      - ${HOME}/.ssh:/host-ssh:ro
      # Socket ssh-agent (optionnel ; s'évapore si SSH_AUTH_SOCK vide)
      - ${SSH_AUTH_SOCK:-/dev/null}:${SSH_AUTH_SOCK:-/dev/null}
      # Docker socket (Franck 2026-04-20 23:46) - Option A / DooD.
      # Permet aux agents d'appeler `docker ...` via fs_cli__run_command.
      # Le GID du socket est aligné dynamiquement par l'entrypoint sur
      # le groupe `docker` du container, puis `node` y est ajouté.
      # [CRITICAL] accès = root sur l'hôte; cf. Dockerfile.
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
